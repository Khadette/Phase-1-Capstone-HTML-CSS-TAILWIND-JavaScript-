<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Favorites — Book Explorer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'ink': '#0d0d0f',
            'ink-2': '#141418',
            'ink-3': '#1c1c22',
            'ink-4': '#26262e',
            'amber': '#f59e0b',
            'amber-soft': '#fbbf24',
            'cream': '#fef3c7',
            'muted': '#6b7280',
            'muted-2': '#9ca3af',
          },
          fontFamily: {
            'display': ['"Playfair Display"', 'serif'],
            'body': ['"DM Sans"', 'sans-serif'],
          }
        }
      }
    }
  </script>
</head>
<body class="bg-black text-gray-100 font-body min-h-screen">

  <!-- NAVBAR -->
  <nav class="fixed top-0 left-0 right-0 z-50 bg-indigo-950/90 backdrop-blur-md border-b border-indigo-400/20">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex items-center justify-between h-16">
        <a href="index.html" class="flex items-center gap-2 group">
          <span class="text-amber text-2xl">📚</span>
          <span class="font-display text-xl font-bold text-white group-hover:text-amber transition-colors">Book<span class="text-amber">Explorer</span></span>
        </a>
        <div class="hidden md:flex items-center gap-8">
          <a href="index.html" class="nav-link text-muted-2 hover:text-white font-medium text-sm tracking-wide uppercase transition-colors">Home</a>
          <a href="favorites.html" class="nav-link active text-amber font-medium text-sm tracking-wide uppercase">Favorites</a>
          <a href="about.html" class="nav-link text-muted-2 hover:text-white font-medium text-sm tracking-wide uppercase transition-colors">About</a>
        </div>
        <button id="menuBtn" class="md:hidden text-muted-2 hover:text-white transition-colors p-2">
          <svg id="menuIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
          <svg id="closeIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>

    <div id="mobileMenu" class="hidden md:hidden bg-indigo-900/95 border-t border-indigo-400/20">
      <div class="px-4 py-4 space-y-3">
        <a href="index.html" class="block text-muted-2 hover:text-white font-medium text-sm tracking-wide uppercase py-2 transition-colors">Home</a>
        <a href="favorites.html" class="block text-amber font-medium text-sm tracking-wide uppercase py-2">Favorites</a>
        <a href="about.html" class="block text-muted-2 hover:text-white font-medium text-sm tracking-wide uppercase py-2 transition-colors">About</a>
      </div>
    </div>
</nav>

  <!-- PAGE HEADER -->
<section class="pt-16 bg-black-2">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
    <p class="text-amber text-sm font-medium tracking-[0.3em] uppercase mb-3 fade-in">Your Collection</p>
    <h1 class="font-display text-5xl font-black text-white mb-3 fade-in stagger-1">
      My <span class="text-amber italic">Favorites</span>
    </h1>
    <p class="text-muted-2 text-lg fade-in stagger-2">Books you've saved to revisit and cherish.</p>
  </div>
</section>

  <!-- MAIN -->
  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-14">

    <!-- Stats bar -->
    <div class="flex items-center justify-between mb-10">
      <p id="favCount" class="text-muted text-sm"></p>
      <button id="clearAllBtn" class="hidden text-red-400 hover:text-red-300 text-sm font-medium transition-colors border border-red-400/30 hover:border-red-300/50 px-4 py-2 rounded-lg">
        Clear All
      </button>
    </div>

    <!-- Empty State -->
    <div id="emptyState" class="hidden py-24 text-center">
      <p class="text-6xl mb-6">🔖</p>
      <h3 class="font-display text-3xl text-white mb-3">No favorites yet</h3>
      <p class="text-muted-2 mb-8 max-w-sm mx-auto">Start exploring and hit the bookmark button on any book to save it here.</p>
      <a href="index.html" class="inline-block bg-amber hover:bg-amber-soft text-ink font-semibold text-sm px-8 py-3 rounded-xl transition-all duration-200 hover:scale-105">
        Browse Books
      </a>
    </div>

    <!-- Grid -->
    <div id="favoritesGrid" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-5"></div>

  </main>

  <!-- FOOTER -->
  <footer class="border-t border-white/5 bg-ink-2 mt-10">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
    
    <div class="flex items-center justify-center text-center">
      <p class="text-muted text-sm">
        Powered by 
        <a href="https://openlibrary.org" target="_blank" class="text-amber hover:underline">
          Open Library
        </a>
        · Built with ❤️ for book lovers
      </p>
    </div>

  </div>
</footer>

  <script src="js/utils.js"></script>
  <script src="js/favorites.js"></script>
</body>
</html>
